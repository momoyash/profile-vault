name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: profile-vault.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: profile-vault
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: profile-vault

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../profile-vault-${{ matrix.target }}.zip profile-vault.exe

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../profile-vault-${{ matrix.target }}.tar.gz profile-vault

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-vault-${{ matrix.target }}
          path: profile-vault-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            profile-vault-x86_64-pc-windows-msvc/profile-vault-x86_64-pc-windows-msvc.zip
            profile-vault-x86_64-unknown-linux-gnu/profile-vault-x86_64-unknown-linux-gnu.tar.gz
            profile-vault-x86_64-apple-darwin/profile-vault-x86_64-apple-darwin.tar.gz
